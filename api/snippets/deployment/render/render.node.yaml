# Render Blueprint — Node/Express + Prisma backend.
# Create a new Blueprint instance from this repo at https://render.com.
services:
  - type: web
    name: {{PROJECT_NAME}}-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma generate && npm run build
    # v1 bootstraps the schema with `prisma db push` (no migration files yet).
    startCommand: npx prisma db push && npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Set DATABASE_URL, AUTH0_DOMAIN, AUTH0_AUDIENCE, CLIENT_URL in the dashboard.
